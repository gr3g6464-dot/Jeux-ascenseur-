<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Jeu Ascenseur</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }
    button {
      padding: 15px;
      margin: 10px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
    }
    .create { background: green; }
    .join { background: blue; }
  </style>
</head>

<body>

<h1>Jeu Ascenseur</h1>

<button class="create" onclick="createGame()">Créer une partie</button>
<br>
<button class="join">Rejoindre une partie</button>

<p id="code"></p>

<script>
function createGame() {
  const code = Math.random().toString(36).substring(2, 7).toUpperCase();
  document.getElementById("code").innerText = "Code : " + code;
}
</script>

</body>
</html>
