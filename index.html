<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Jeu Ascenseur</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }
    .container {
      padding: 20px;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 20px;
    }
    button {
      padding: 15px 20px;
      margin: 10px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
    .create {
      background: #22c55e;
    }
    .join {
      background: #3b82f6;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Jeu Ascenseur</h1>
    <button class="create">Créer une partie</button>
    <br>
    <button class="join">Rejoindre une partie</button>
  </div>
</body>
</html>
